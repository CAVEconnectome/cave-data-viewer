name: tests

on:
  push:
  pull_request:

# CI runs the exact same commands developers run locally:
#   uv run pytest        (backend)
#   npm test             (frontend, in frontend/)
# Keep it that way — no CI-only test behavior.

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run pytest
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
