schema_version: 1
id: morpho_sample
title: Morphology features (synthetic sample)
description: Synthetic sample feature table for local Feature Explorer development.
  cell_ids do not correspond to real nucleus_detection_v0 rows unless the generator
  was run with --ids-csv.
source:
  kind: parquet
id_column: cell_id
cell_id_source_table: nucleus_detection_v0
feature_columns:
- soma_depth_y
- nucleus_volume_um
- soma_area_um
categorical_columns:
- predicted_class
- predicted_subclass
spatial_post_columns:
- soma_depth_y
depth_columns:
- soma_depth_y
audit:
  source_root_column: source_root_id
  source_mat_version_column: source_mat_version
categories:
- id: morphology
  title: Morphology
  description: Soma + nucleus geometry
  columns:
  - soma_depth_y
  - nucleus_volume_um
  - soma_area_um
- id: classifier
  title: Classifier
  description: Predicted class labels
  columns:
  - predicted_class
  - predicted_subclass
scaling: zscore
clip_percentiles:
- 0.1
- 99.9
embeddings:
- id: umap
  title: UMAP
  axes:
  - umap_x
  - umap_y
  default_color_by: predicted_subclass
