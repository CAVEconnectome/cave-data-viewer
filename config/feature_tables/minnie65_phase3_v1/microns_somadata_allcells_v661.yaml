schema_version: 1
id: microns_somadata_allcells_v661
title: Perisomatic Features
description: Soma and nucleus features associated with Elabbady et al. 2025

source:
  kind: parquet
  uri: file:///Users/caseysm/Work/Code/cave-data-viewer/microns_SomaData_AllCells_v661.parquet

id_column: nucleus_id
cell_id_source_table: nucleus_detection_v0

feature_columns:
  - soma_depth_x
  - soma_depth_y
  - soma_depth_z
  - nucleus_volume_um
  - nucleus_area_um
  - nuclear_area_to_volume_ratio
  - nuclear_folding_area_um
  - fraction_nuclear_folding
  - nucleus_to_soma_ratio
  - soma_volume_um
  - soma_area_um
  - soma_to_nucleus_center_dist_um
  - soma_area_to_volume_ratio
  - soma_synapse_number
  - soma_synapse_density_um

categorical_columns:
  - is_column
  - cortical_column_labels
  - predicted_class
  - predicted_subclass

# Post-transform: all three live in the aligned-volume's cortical frame.
# Cortical y is depth (pia → white matter); x and z are tangential
# within the cortical sheet despite their `_depth_` prefix.
spatial_post_columns:
  - soma_depth_x
  - soma_depth_y
  - soma_depth_z

# Only y is the actual depth axis — the renderer auto-flips axes bound
# to a depth column and overlays cortical layer boundaries, both of
# which are wrong for the tangential x/z axes.
depth_columns:
  - soma_depth_y

categories:
  - id: nuclear
    title: Nuclear
    description: Nucleus only features
    columns:
      - nucleus_volume_um
      - nucleus_area_um
      - nuclear_area_to_volume_ratio
      - nuclear_folding_area_um
      - fraction_nuclear_folding
      - nucleus_to_soma_ratio
  - id: soma-surface
    title: Soma
    description: Soma features
    columns:
      - soma_volume_um
      - soma_area_um
      - soma_to_nucleus_center_dist_um
      - soma_area_to_volume_ratio
      - soma_synapse_number
      - soma_synapse_density_um
  - id: classifications
    title: Classifications
    description: Classifications
    columns:
      - cortical_column_labels
      - predicted_class
      - predicted_subclass

scaling: robust
clip_percentiles: [0.1, 99.9]

embeddings:
  - id: umap_embedding
    title: UMAP-EMBEDDING
    axes:
      - umap_embedding_x
      - umap_embedding_y
    default_color_by: predicted_class
