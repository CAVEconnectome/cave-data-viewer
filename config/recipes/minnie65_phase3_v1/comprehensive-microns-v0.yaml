version: 1
kind: connectivity
id: comprehensive-microns-v0
title: Comprehensive View
description: Cell type plus proofreading and comprehensive cell type and connectivity plots.
decoration_tables:
  - proofreading_status_and_strategy
  - cell_type_multifeature_combo
plots:
- id: plot-1
  summary_kind: synapse_depth_profile
- id: plot-2
  bindings:
    x: soma_depth
    y: median_syn_depth_out
    hue: cell_type_multifeature_combo.cell_type
    size: net_size_out
  unfiltered: true
- id: plot-3
  bindings:
    x: cell_type_multifeature_combo.cell_type
    weight: net_size_out
  unfiltered: true
- id: plot-4
  bindings:
    x: cell_type_multifeature_combo.cell_type
    weight: net_size_in
- id: plot-5
  bindings:
    x: median_dist_to_target_soma_out
    scope: output
  unfiltered: true
- id: plot-6
  bindings:
    x: radial_dist_root_soma
    y: soma_depth
    hue: cell_type_multifeature_combo.cell_type
    size: net_size_out
  unfiltered: true
- id: plot-7
  bindings:
    x: net_size_in
    y: soma_depth
    hue: cell_type_multifeature_combo.cell_type
    size: mean_size_in
    scope: input
cells: "proofreading_status_and_strategy.status_axon:eq:true"
