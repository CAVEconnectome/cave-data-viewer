# Config for the minnie65_phase3 aligned volume. Shared by every datastack
# mounted on this volume — currently `minnie65_public` (release) and
# `minnie65_phase3_v1` (working). Any proofreading version of the same volume
# inherits this and gets identical depth axes, layer boundaries, and synapse
# conventions. Per-datastack YAMLs can still field-by-field override.

# `cortex` provider wraps standard_transform: input nm → oriented µm with
# axis 1 as depth (pia → white matter) and axes 0/2 as the tangential plane.
# Params are validated by CortexSpatialProvider:
#   transform        — short name for the standard_transform constructor
#   depth_range      — µm; fixes depth-axis range on depth-bound plots so
#                      neurons share a coordinate system
#   layer_boundaries — µm, top-to-bottom; drawn as guides on depth-axis plots
#   layer_names      — parallel to layer_boundaries (Schneider-Mizell et al.)
spatial:
  provider: cortex
  params:
    transform: minnie_nm
    depth_range: [0, 775]
    layer_boundaries: [91.80615154, 261.21908419, 391.8631847, 537.04973966, 753.58049474]
    layer_names: [L1, L2/3, L4, L5, L6]

# Synapse-table conventions are driven by the segmentation pipeline, which
# is the same across every datastack mounted on this aligned volume — so
# they live here, not on each datastack YAML. Datastacks override
# field-by-field via their own `synapse:` block when they need to.
synapse:
  position_prefix: ctr_pt
  columns:
    - id
    - pre_pt_root_id
    - post_pt_root_id
    - size
    - ctr_pt_position
  aggregation_rules:
    mean_size:
      column: size
      agg: mean
    net_size:
      column: size
      agg: sum
